name: iOS Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.38.6"

jobs:
  build-ios:
    name: Build unsigned iOS package
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          xcodebuild -version
          pod --version

      - name: Install dependencies
        run: flutter pub get

      - name: Install iOS pods
        run: |
          cd ios
          pod install --repo-update

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Package unsigned artifacts
        run: |
          mkdir -p build/ios/unsigned
          ditto -c -k --sequesterRsrc --keepParent \
            build/ios/iphoneos/Runner.app \
            build/ios/unsigned/Runner.app.zip

          rm -rf build/ios/ipa
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -qry ../unsigned/Runner-unsigned.ipa Payload

      - name: Upload unsigned iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-release
          path: build/ios/unsigned/*
          if-no-files-found: error
          retention-days: 14
